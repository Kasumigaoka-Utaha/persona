services:
  - type: web
    name: user-realtime-jury-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PMS_AI_PROVIDER
        value: openai
      - key: PMS_OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: PMS_OPENAI_MODEL
        value: gpt-4.1-mini
      - key: PMS_OPENAI_API_KEY
        sync: false
      - key: PMS_GEMINI_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: PMS_GEMINI_MODEL
        value: gemini-2.5-flash
      - key: PMS_GEMINI_API_KEY
        sync: false
